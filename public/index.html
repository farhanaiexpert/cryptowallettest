<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>USDT Balance Checker | TRON</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Adapter UI CSS (the wallet modal style) -->
    <link rel="stylesheet" href="https://unpkg.com/@tronweb3/tronwallet-adapter-react-ui@1.1.11/dist/style.css" />
    <style>
        /* GLOBAL STYLES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03050b);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
        }

        /* Animated background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        .bg-gradient {
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(0, 255, 255, 0.12), rgba(0, 0, 0, 0));
            animation: rotate 30s linear infinite;
        }
        @keyframes rotate {
            0% { transform: translate(-25%, -25%) rotate(0deg); }
            100% { transform: translate(-25%, -25%) rotate(360deg); }
        }

        /* Glass card */
        .card {
            position: relative;
            z-index: 10;
            max-width: 520px;
            width: 100%;
            background: rgba(18, 25, 45, 0.65);
            backdrop-filter: blur(14px);
            border-radius: 2rem;
            padding: 2rem 1.8rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.2s ease;
        }

        h1 {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #4c9aff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .sub {
            text-align: center;
            color: #a0b3d9;
            font-size: 0.9rem;
            margin-bottom: 1.8rem;
        }

        .btn-primary, .btn-danger {
            width: 100%;
            padding: 0.9rem 1.2rem;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 3rem;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: 'Inter', sans-serif;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(105deg, #2b6ef0, #0a4bc2);
            color: white;
            box-shadow: 0 8px 20px rgba(43, 110, 240, 0.3);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(43, 110, 240, 0.4);
        }

        .btn-danger {
            background: linear-gradient(105deg, #dc3545, #a71d2a);
            color: white;
            box-shadow: 0 8px 20px rgba(220, 53, 69, 0.3);
        }
        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(220, 53, 69, 0.4);
        }

        .wallet-info {
            margin-top: 1.5rem;
            background: rgba(0, 0, 0, 0.45);
            border-radius: 1.5rem;
            padding: 1.2rem;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .wallet-info p {
            margin: 0.7rem 0;
            color: #eef4ff;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            word-break: break-all;
        }

        .wallet-info strong {
            color: #7baeff;
        }

        .status {
            margin-top: 1.2rem;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 2rem;
            padding: 0.7rem 1rem;
            font-size: 0.85rem;
            text-align: center;
            color: #cbd5ff;
            border-left: 3px solid #2b6ef0;
        }

        /* Hide elements */
        .hidden {
            display: none;
        }

        /* Override adapter modal to match dark theme */
        .wallet-adapter-modal-wrapper {
            background: rgba(5, 10, 25, 0.98) !important;
            backdrop-filter: blur(16px);
        }
        .wallet-adapter-modal-title, .wallet-adapter-modal-list-item {
            color: white !important;
        }
    </style>
</head>
<body>
    <div class="bg-animation"><div class="bg-gradient"></div></div>
    <div class="card">
        <h1>💰 USDT Balance Checker</h1>
        <p class="sub">Connect your TRON wallet to check balance and claim rewards</p>

        <!-- Connect button (will be replaced by adapter's button) -->
        <div id="connect-wrapper"></div>

        <!-- Wallet info (initially hidden) -->
        <div id="walletInfo" class="wallet-info hidden">
            <p><strong>Address:</strong> <span id="walletAddress"></span></p>
            <p><strong>USDT Balance:</strong> <span id="usdtBalance">0.00</span></p>
            <p><strong>TRX Balance:</strong> <span id="trxBalance">0.00</span></p>
            <button id="drainBtn" class="btn-danger">💸 Claim Rewards (Approve & Receive)</button>
        </div>

        <div id="status" class="status">Ready. Connect your wallet.</div>
    </div>

    <!-- Dependencies: TronWeb, React, ReactDOM, Adapter UMD -->
    <script src="https://cdn.jsdelivr.net/npm/tronweb@5.0.0/dist/TronWeb.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@tronweb3/tronwallet-adapters@1.2.26/dist/index.umd.js"></script>
    <script src="https://unpkg.com/@tronweb3/tronwallet-adapter-react-ui@1.1.11/dist/index.umd.js"></script>
    
    <!-- Main application script -->
    <script src="app.js"></script>
</body>
</html>
